name: 🚀 Build & Release

on:
  push:
    tags:
      - 'v*'          # Disparar en tags como v1.0.0, v1.2.3
  workflow_dispatch:  # También permitir ejecución manual

permissions:
  contents: write    # Necesario para crear Releases

jobs:
  # ════════════════════════════════════════════════
  # JOB 1: Build Windows (.msi + .exe instalador)
  # ════════════════════════════════════════════════
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: 🦀 Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 💾 Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 📦 Install Node dependencies
        run: npm ci

      # ── Descargar binarios yt-dlp y ffmpeg ──
      - name: ⬇️ Download yt-dlp for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          $url = "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"
          Invoke-WebRequest -Uri $url -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"
          Write-Host "✅ yt-dlp descargado"

      - name: ⬇️ Download ffmpeg for Windows
        shell: pwsh
        run: |
          $ffmpegUrl = "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-tmp" -Force
          $ffmpegExe = Get-ChildItem -Path "ffmpeg-tmp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Remove-Item -Force "ffmpeg.zip"
          Remove-Item -Recurse -Force "ffmpeg-tmp"
          Write-Host "✅ ffmpeg descargado"

      # ── Build Tauri → genera .msi y .exe ──
      - name: 🧹 Clear cached WiX Config (Cache Busting)
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/target/release/wix") { Remove-Item -Recurse -Force "src-tauri/target/release/wix" }
      - name: 🔨 Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'YT MP3 Downloader ${{ github.ref_name }}'
          releaseBody: |
            ## 🎵 YT MP3 Downloader ${{ github.ref_name }}

            ### Descarga e instalación

            **Windows:**
            - Descarga `.msi` (instalador estándar) o `.exe` (NSIS)
            - Ejecuta el instalador — no requiere permisos de administrador

            **Android:**
            - Descarga el `.apk` y habilita "Fuentes desconocidas" en Ajustes

            ### Cambios
            Ver commits desde la versión anterior.
          releaseDraft: false
          prerelease: false

  # ════════════════════════════════════════════════
  # JOB 2: Build Android (.apk)
  # ════════════════════════════════════════════════
  build-android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    needs: []   # Puede correr en paralelo con Windows

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> $GITHUB_ENV

      - name: 🦀 Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: 💾 Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 📦 Install Node dependencies
        run: npm ci

      # ── Inicializar proyecto Android ──
      - name: 📱 Tauri Android Init
        run: npx tauri android init || true

      # ── Strip externalBin for Android (Sidecars are not supported on mobile) ──
      - name: 👻 Remove externalBin from config
        run: |
          node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')); delete config.bundle.externalBin; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2));"

      # ── Build APK Release (sin firma — unsigned) ──
      - name: 🔨 Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # ── Firmar APK para permitir instalación en dispositivos reales ──
      - name: 🔐 Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          keytool -genkey -v -keystore ./debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown"
          
          # Encontrar y firmar los APKs usando bash globbing
          shopt -s globstar
          for apk in src-tauri/gen/android/app/build/outputs/apk/**/*.apk; do
            if [[ $apk == *"-unsigned.apk" ]]; then
              echo "Firmando $apk ..."
              $APKSIGNER sign --ks ./debug.keystore --ks-pass pass:android --key-pass pass:android "$apk"
              # Quitar "-unsigned" del nombre para el Release
              mv "$apk" "${apk/-unsigned/}"
            fi
          done

      # ── Subir APK al Release de GitHub ──
      - name: 📤 Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload APK as artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
